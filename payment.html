    <script>

document
.getElementById("paymentForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const transactionId =
        "TXN" + Date.now();

    const amount =
        document.getElementById("amount").value;

    const policyNumber =
        document.getElementById("policyNumber").value;

    // GA4 Purchase Event
    window.dataLayer = window.dataLayer || [];

    dataLayer.push({
        event: "purchase",
        transaction_id: transactionId,
        value: amount,
        currency: "USD",
        policy_number: policyNumber
    });

    window.location.href =
        "https://deepthi-1984.github.io/healthcare_website/payment-success.html" +
        "?txn=" + transactionId +
        "&amount=" + amount +
        "&policy=" + policyNumber;

});

</script>
<script>

   dataLayer.push({
