<!DOCTYPE html>
<html>
<head>
<title>Payment Center</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fa;
}

.container{
    width:600px;
    margin:auto;
    margin-top:50px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    background:#0066a1;
    color:white;
    border:none;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Insurance Premium Payment</h2>

<form action="payment-success.html">

<label>Policy Number</label>
<input type="text" value="POL123456">

<label>Amount</label>
<input type="text" value="$250">

<label>Card Number</label>
<input type="text">

<label>Expiry Date</label>
<input type="month">

<label>CVV</label>
<input type="password">

<button type="submit">
Complete Payment
</button>

</form>

</div>

</div>
    <script>

document
.getElementById("paymentForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const transactionId =
        "TXN" + Date.now();

    const amount =
        document.getElementById("amount").value;

    const policyNumber =
        document.getElementById("policyNumber").value;

    // GA4 Purchase Event
    window.dataLayer = window.dataLayer || [];

    dataLayer.push({
        event: "purchase",
        transaction_id: transactionId,
        value: amount,
        currency: "USD",
        policy_number: policyNumber
    });

    window.location.href =
        "https://deepthi-1984.github.io/health-care_website/payment-success.html" +
        "?txn=" + transactionId +
        "&amount=" + amount +
        "&policy=" + policyNumber;

});

</script>

</body>
</html>
